name: Smoke Checks

on:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        check:
          - cli-smoke
          - nixvim-smoke

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@b66b36319cc6fde4ea85edd583b088c65d6b8710
        with:
          extra-conf: |
            accept-flake-config = true
            github-access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = https://noctalia.cachix.org
            extra-trusted-public-keys = noctalia.cachix.org-1:pCOR47nnMEo5thcxNDtzWpOxNFQsBRglJzxWPp3dkU4=

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@1828eb4e5414b8dfe36daae53ea3e4b8c3fdec7a

      - name: Build ${{ matrix.check }}
        run: nix build --no-link .#checks.x86_64-linux.${{ matrix.check }} --accept-flake-config --show-trace --print-build-logs
