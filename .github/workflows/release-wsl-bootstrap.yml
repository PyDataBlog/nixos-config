name: Release WSL Bootstrap

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release-wsl-bootstrap.yml
      - flake.nix
      - flake.lock
      - flake/hosts.nix
      - features/nixos/base.nix
      - features/nixos/wsl.nix
      - hosts/wslbootstrap/**
      - nixosModules/base.nix
      - nixosModules/core.nix
      - nixosModules/corporate-ca.nix
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        type: string

concurrency:
  group: release-wsl-bootstrap-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and release wslbootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210
        with:
          extra-conf: |
            accept-flake-config = true
            github-access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = https://noctalia.cachix.org
            extra-trusted-public-keys = noctalia.cachix.org-1:pCOR47nnMEo5thcxNDtzWpOxNFQsBRglJzxWPp3dkU4=

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@1828eb4e5414b8dfe36daae53ea3e4b8c3fdec7a

      - name: Materialize corporate CA
        env:
          ZSCALER_PEM: ${{ secrets.ZSCALER_PEM }}
        run: |
          if [ -z "${ZSCALER_PEM}" ]; then
            echo "ZSCALER_PEM secret is not set" >&2
            exit 1
          fi

          PEM_PATH="$RUNNER_TEMP/zscaler.pem"
          printf '%s\n' "$ZSCALER_PEM" > "$PEM_PATH"
          chmod 600 "$PEM_PATH"
          echo "ZSCALER_PEM_FILE=$PEM_PATH" >> "$GITHUB_ENV"

      - name: Build bootstrap image
        run: |
          rm -f nixos.wsl nixos-wsl-bootstrap-x86_64-linux.wsl
          NIX_BIN="$(command -v nix)"
          sudo --preserve-env=ZSCALER_PEM_FILE "$NIX_BIN" run .#nixosConfigurations.wslbootstrap.config.system.build.tarballBuilder --accept-flake-config --impure
          test -f nixos.wsl
          mv nixos.wsl nixos-wsl-bootstrap-x86_64-linux.wsl

      - name: Create or update release
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="wslbootstrap-main"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" nixos-wsl-bootstrap-x86_64-linux.wsl --clobber
          else
            gh release create "$TAG" nixos-wsl-bootstrap-x86_64-linux.wsl \
              --title "$TAG" \
              --notes "Minimal NixOS-WSL bootstrap image with the corporate CA trust bundle only."
          fi
